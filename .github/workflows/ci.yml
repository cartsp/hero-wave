name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/HeroWave.E2E.csproj') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Unit Tests (bUnit)
        run: dotnet test tests/HeroWave.Tests/ --no-build -v normal

      - name: Install Playwright Browsers
        run: pwsh tests/HeroWave.E2E/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: E2E Tests (Playwright)
        run: dotnet test tests/HeroWave.E2E/ --no-build -v normal
